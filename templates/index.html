<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tallo Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/static/favicon.png" />

    <link rel="apple-touch-icon" href="/static/favicon.png" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav class="v-nav">
      <h1 id="resetLogo" class="v-logo">TALLO</h1>

      <div class="nav-controls">
        <div class="custom-select-wrapper" id="boardSelectWrapper">
          <button
            id="boardSelectTrigger"
            class="icon-btn"
            aria-label="Select Board"
            title="All Boards"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 12 12 17 22 12"></polyline>
              <polyline points="2 17 12 22 22 17"></polyline>
            </svg>
          </button>
          <div class="custom-select-options" id="boardSelectOptions"></div>
        </div>

        <button
          id="selectModeBtn"
          class="icon-btn"
          aria-label="Batch Select Mode"
          title="Select Multiple"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </button>
        <button
          id="shuffleBtn"
          class="icon-btn"
          aria-label="Shuffle Gallery"
          title="Shuffle Mode"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="16 3 21 3 21 8"></polyline>
            <line x1="4" y1="20" x2="21" y2="3"></line>
            <polyline points="21 16 21 21 16 21"></polyline>
            <line x1="15" y1="15" x2="21" y2="21"></line>
            <line x1="4" y1="4" x2="9" y2="9"></line>
          </svg>
        </button>

        <button
          id="mobileMenuToggle"
          class="icon-btn mobile-only"
          aria-label="Toggle Filters"
          title="Search"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>

        <div class="nav-filters" id="navFilters">
          <div class="search-wrapper">
            <svg
              class="search-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="Search..."
              class="v-input"
            />
            <button
              id="clearSearchBtn"
              class="clear-search-btn"
              aria-label="Clear Search"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="global-tag-cloud-wrapper">
      <div id="globalTagCloud" class="global-tag-cloud"></div>
    </div>

    <main class="masonry-grid" id="gallery"></main>

    <div id="autocompleteDropdown" class="autocomplete-glass"></div>

    <div id="lightbox" class="lightbox-overlay">
      <button
        id="lightboxClose"
        class="icon-btn lightbox-close"
        aria-label="Close Fullscreen"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="lightbox-content" id="lightboxContent"></div>
      <div class="lightbox-tags" id="lightboxTags"></div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
